<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="50%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <!-- dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow orbs -->
  <ellipse cx="1050" cy="120"  rx="320" ry="280" fill="rgba(167,139,250,0.18)"/>
  <ellipse cx="140"  cy="520"  rx="240" ry="200" fill="rgba(99,102,241,0.14)"/>

  <!-- Icon container -->
  <rect x="84" y="180" width="120" height="120" rx="24" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- PDF icon (simplified) -->
  <text x="144" y="262" font-size="64" text-anchor="middle" fill="white" font-family="serif">📄</text>

  <!-- Brand name -->
  <text x="84" y="370" font-size="72" font-weight="700" fill="white" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" letter-spacing="-1">MyEasyPDF</text>

  <!-- Tagline -->
  <text x="84" y="428" font-size="30" fill="rgba(255,255,255,0.78)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Free PDF tools — 100% in your browser. No uploads.</text>

  <!-- Tool pills -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">
    <!-- Image to PDF -->
    <rect x="84"  y="466" width="190" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="179" y="493" text-anchor="middle">Image to PDF</text>
    <!-- Merge PDF -->
    <rect x="288" y="466" width="160" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="368" y="493" text-anchor="middle">Merge PDF</text>
    <!-- Split PDF -->
    <rect x="462" y="466" width="148" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="536" y="493" text-anchor="middle">Split PDF</text>
    <!-- Rotate PDF -->
    <rect x="624" y="466" width="160" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="704" y="493" text-anchor="middle">Rotate PDF</text>
    <!-- PDF to Image -->
    <rect x="798" y="466" width="188" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="892" y="493" text-anchor="middle">PDF to Image</text>
  </g>

  <!-- URL badge -->
  <rect x="84" y="548" width="260" height="44" rx="22" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="214" y="576" text-anchor="middle" font-size="20" fill="rgba(255,255,255,0.7)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">🔒 myeasypdf.com</text>
</svg>
